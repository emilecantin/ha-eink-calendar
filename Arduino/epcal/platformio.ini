; PlatformIO Project Configuration File
;
; E-Ink Calendar
;
; Build: pio run
; Upload: pio run -t upload
; Monitor: pio device monitor
; Build + Upload + Monitor: pio run -t upload && pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor speed
monitor_speed = 115200

; Libraries
lib_deps =
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.0.0
    ricmoo/QRCode@^0.0.1

; Extra library paths (for Waveshare e-paper library)
lib_extra_dirs =
    ~/Documents/Arduino/libraries

; Custom partition: 1.5MB OTA app slots + 384KB LittleFS for bitmap chunk staging
; Firmware is ~1.3MB, so 1.5MB app slots give enough headroom
board_build.partitions = partitions.csv

; Build flags — FIRMWARE_VERSION is passed via PLATFORMIO_BUILD_FLAGS from Makefile
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_LOOP_STACK_SIZE=16384  ; OTA over HTTPS needs >8KB stack
    -Wno-error=return-type  ; Waveshare library has a missing return in EPD_12in48B_Init

; Upload settings (adjust port as needed)
; upload_port = /dev/ttyUSB0
; upload_speed = 921600

; =============================================================================
; Native test environment — runs on the host machine (no ESP32 needed)
;
; Usage:  pio test -e native
;
; Stubs in test/stubs/ provide minimal Arduino API types so firmware headers
; (config.h, http_client.h, display.h) can be included without the real SDK.
; =============================================================================
[env:native]
platform = native
test_framework = unity

; Resolve #include <Arduino.h> etc. from our stubs directory,
; and firmware headers from src/
build_flags =
    -std=c++17
    -I test/stubs
    -I src

; Only build test files + stubs (do NOT compile firmware .cpp/.ino files,
; which depend on ESP32 SDK APIs like Preferences, WiFi, etc.)
test_build_src = no
build_src_filter =
    +<../test/stubs/stubs.cpp>
