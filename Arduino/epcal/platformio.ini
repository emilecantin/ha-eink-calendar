; PlatformIO Project Configuration File
;
; EPCAL - E-Paper Calendar
;
; Build: pio run
; Upload: pio run -t upload
; Monitor: pio device monitor
; Build + Upload + Monitor: pio run -t upload && pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor speed
monitor_speed = 115200

; Libraries
lib_deps =
    tzapu/WiFiManager@^2.0.17

; Extra library paths (for Waveshare e-paper library)
lib_extra_dirs =
    ~/Documents/Arduino/libraries

; Partition scheme with more app space (no OTA)
; Use "huge_app" for 3MB app space, or "default" if you need OTA
board_build.partitions = huge_app.csv

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0

; Upload settings (adjust port as needed)
; upload_port = /dev/ttyUSB0
; upload_speed = 921600

; Extra scripts (uncomment if you need pre/post build hooks)
; extra_scripts = pre:scripts/pre_build.py
