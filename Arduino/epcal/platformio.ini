; PlatformIO Project Configuration File
;
; E-Ink Calendar
;
; Build: pio run
; Upload: pio run -t upload
; Monitor: pio device monitor
; Build + Upload + Monitor: pio run -t upload && pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor speed
monitor_speed = 115200

; Libraries
lib_deps =
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.0.0
    ricmoo/QRCode@^0.0.1

; Extra library paths (for Waveshare e-paper library)
lib_extra_dirs =
    ~/Documents/Arduino/libraries

; Custom partition: 1.5MB OTA app slots + 384KB SPIFFS for bitmap chunk staging
; Firmware is ~1.3MB, so 1.5MB app slots give enough headroom
board_build.partitions = partitions.csv

; Build flags — FIRMWARE_VERSION is passed via PLATFORMIO_BUILD_FLAGS from Makefile
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0
    -Wno-error=return-type  ; Waveshare library has a missing return in EPD_12in48B_Init

; Upload settings (adjust port as needed)
; upload_port = /dev/ttyUSB0
; upload_speed = 921600
