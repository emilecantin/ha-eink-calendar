# GitLab CI/CD for EPCAL
# Builds multi-arch Docker images for the Home Assistant Add-on

stages:
  - build

variables:
  # GitLab Container Registry
  REGISTRY: ${CI_REGISTRY}
  IMAGE_NAME: ${CI_REGISTRY_IMAGE}/addon

# Build and push multi-arch images
build-addon:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: "1"
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
    # Set up QEMU for multi-arch builds
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    # Create buildx builder (use docker-container driver with explicit endpoint)
    - docker context create builder-context --docker "host=tcp://docker:2375"
    - docker buildx create --name multiarch --driver docker-container --use builder-context
    - docker buildx inspect --bootstrap
  script:
    # Determine version tag
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        VERSION=${CI_COMMIT_TAG}
      else
        VERSION=${CI_COMMIT_SHORT_SHA}
      fi
    # Build and push multi-arch image
    - |
      docker buildx build \
        --platform linux/amd64,linux/arm64,linux/arm/v7 \
        --file addon/Dockerfile \
        --tag ${IMAGE_NAME}:${VERSION} \
        --tag ${IMAGE_NAME}:latest \
        --push \
        .
  rules:
    # Run on tags (releases)
    - if: $CI_COMMIT_TAG
    # Run on main branch
    - if: $CI_COMMIT_BRANCH == "main"
    # Allow manual trigger on other branches
    - if: $CI_COMMIT_BRANCH
      when: manual
      allow_failure: true
