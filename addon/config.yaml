# EPCAL - E-Paper Calendar Add-on for Home Assistant
# https://developers.home-assistant.io/docs/add-ons/configuration

name: "EPCAL - E-Paper Calendar"
description: "Render Home Assistant calendars to e-paper displays"
version: "1.0.0"
slug: "epcal"
url: "https://gitlab.com/emilecantin/epcal"

# Pre-built image from GitLab Container Registry
# Built by CI/CD pipeline - see .gitlab-ci.yml
image: registry.gitlab.com/emilecantin/epcal/addon

# Startup behavior
init: false
startup: application
boot: auto

# Architecture support
arch:
  - amd64
  - aarch64
  - armv7

# Network configuration
ports:
  4000/tcp: 4000
ports_description:
  4000/tcp: "Web UI and API"

# Ingress for seamless UI integration
ingress: true
ingress_port: 4000
ingress_stream: false
panel_icon: "mdi:calendar"
panel_title: "E-Paper Calendar"

# Home Assistant API access
homeassistant_api: true
auth_api: true

# Options schema - configurable via HA UI
options:
  log_level: info

schema:
  log_level: list(debug|info|warning|error)

# Resource limits (optional, can be adjusted)
# memory: 256

# Environment variables passed to container
environment:
  TZ: America/Toronto
